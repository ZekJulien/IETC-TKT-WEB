<nav class="nav" [class.is-expanded]="menuOpen()">
  <div class="nav__top">
    <a class="nav__brand" routerLink="/" title="TKT Helpdesk">
      <span class="nav__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z" />
          <path d="M13 5v2" />
          <path d="M13 11v2" />
          <path d="M13 17v2" />
        </svg>
      </span>
      <span class="nav__wordmark label">
        <span class="nav__title">TKT</span>
        <span class="nav__subtitle">Helpdesk</span>
      </span>
    </a>
  </div>

  <ul class="nav__list">
    @for (item of navItems; track item.route) {
      @if (item.show()) {
        <li>
          <a
            [routerLink]="'/' + item.route"
            routerLinkActive="is-active"
            [title]="item.labelKey | translate"
          >
            <svg class="nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              @switch (item.icon) {
                @case ('dashboard') {
                  <rect width="7" height="7" x="3" y="3" rx="1.5" />
                  <rect width="7" height="7" x="14" y="3" rx="1.5" />
                  <rect width="7" height="7" x="14" y="14" rx="1.5" />
                  <rect width="7" height="7" x="3" y="14" rx="1.5" />
                }
                @case ('tickets') {
                  <path d="M3 9a3 3 0 0 1 0 6v1a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1a3 3 0 0 1 0-6V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2Z" />
                  <path d="M13 6v12" />
                }
                @case ('members') {
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                  <circle cx="9" cy="7" r="4" />
                  <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                  <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                }
              }
            </svg>
            <span class="label">{{ item.labelKey | translate }}</span>
          </a>
        </li>
      }
    }
  </ul>

  <div class="nav__account">
    <app-tenant-switcher />

    <div class="nav__account-control">
      @if (menuOpen()) {
        <div class="nav__menu" role="menu">
          <button class="nav__menu-item" type="button" role="menuitem" (click)="logout()">
            <svg
              class="nav__menu-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" x2="9" y1="12" y2="12" />
            </svg>
            <span>{{ 'navbar.logout' | translate }}</span>
          </button>
        </div>
      }

      <button
        class="nav__account-btn"
        type="button"
        [class.is-open]="menuOpen()"
        [attr.aria-label]="'navbar.menu' | translate"
        [attr.aria-expanded]="menuOpen()"
        (click)="toggleMenu($event)"
      >
        <app-avatar [name]="displayName()" [size]="36" round />
        <span class="nav__account-name label">{{
          displayName() || ('navbar.account' | translate)
        }}</span>
        <svg
          class="nav__account-caret label"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="m18 15-6-6-6 6" />
        </svg>
      </button>
    </div>
  </div>
</nav>
