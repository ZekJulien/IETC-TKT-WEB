@if (store.loading() && !store.loaded()) {
  <p class="tickets-table__muted">{{ 'ticketsPage.loading' | translate }}</p>
} @else if (store.error(); as err) {
  <app-alert>{{ err }}</app-alert>
} @else {
  <div class="tickets-table__wrap">
    <app-datatable
      [columns]="columns()"
      [rows]="store.items()"
      trackKey="ticketId"
      [emptyLabel]="'ticketsPage.empty' | translate"
      [rowLink]="ticketLink"
    >
      <ng-template appDatatableCell="ticketNumber" let-row>
        <a class="tickets-table__number" [routerLink]="['/tickets', row.ticketId]">
          {{ formatNumber(row.ticketNumber) }}
        </a>
      </ng-template>

      <ng-template appDatatableCell="title" let-row>
        <a class="tickets-table__title" [routerLink]="['/tickets', row.ticketId]">{{
          row.title
        }}</a>
      </ng-template>

      <ng-template appDatatableCell="status" let-row>
        <app-ticket-status-badge [status]="row.status" />
      </ng-template>

      <ng-template appDatatableCell="priority" let-row>
        <app-ticket-priority-badge [priority]="row.priority" />
      </ng-template>

      <ng-template appDatatableCell="assignedTo" let-row>
        {{ assigneeLabel(row.assignedTo) }}
      </ng-template>

      <ng-template appDatatableCell="createdAt" let-row>
        {{ row.createdAt | date: 'dd/MM/yyyy' }}
      </ng-template>
    </app-datatable>
  </div>
}
