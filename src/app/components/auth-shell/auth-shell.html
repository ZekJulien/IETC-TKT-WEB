<div class="auth">
  <aside class="auth__brand">
    <div class="auth__texture" aria-hidden="true"></div>

    <div class="auth__brand-inner">
      <a class="auth__logo" routerLink="/" title="TKT Helpdesk">
        <span class="auth__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z" />
            <path d="M13 5v2" />
            <path d="M13 11v2" />
            <path d="M13 17v2" />
          </svg>
        </span>
        <span class="auth__wordmark">
          <span class="auth__title">{{ 'common.brand.name' | translate }}</span>
          <span class="auth__subtitle">{{ 'common.brand.subtitle' | translate }}</span>
        </span>
      </a>

      <p class="auth__tagline">{{ tagline() | translate }}</p>
    </div>
  </aside>

  <section class="auth__panel">
    <div class="auth__content">
      <ng-content />
    </div>
  </section>
</div>
