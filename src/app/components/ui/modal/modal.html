@if (open()) {
  <div class="modal" (click)="close()">
    <div class="modal__panel" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
      <header class="modal__head">
        @if (heading()) {
          <h2 class="modal__title">{{ heading() }}</h2>
        }
        <button
          class="modal__close"
          type="button"
          [attr.aria-label]="closeLabel() || null"
          (click)="close()"
        >
          <svg
            viewBox="0 0 24 24"
            width="18"
            height="18"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </header>

      <div class="modal__body">
        <ng-content />
      </div>
    </div>
  </div>
}
