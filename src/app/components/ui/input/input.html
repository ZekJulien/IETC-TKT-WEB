<input
  class="input"
  [class.input--invalid]="invalid"
  [id]="inputId() || null"
  [type]="type()"
  [value]="value()"
  [disabled]="disabled()"
  [attr.placeholder]="placeholder() || null"
  [attr.autocomplete]="autocomplete() || null"
  (input)="handleInput($event)"
  (blur)="handleBlur()"
/>
