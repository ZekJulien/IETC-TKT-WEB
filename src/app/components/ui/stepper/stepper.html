<ol class="stepper">
  @for (step of steps(); track step; let i = $index) {
    <li
      class="stepper__step"
      [class.stepper__step--done]="i < current()"
      [class.stepper__step--active]="i === current()"
    >
      <span class="stepper__marker" aria-hidden="true">
        @if (i < current()) {
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5" />
          </svg>
        } @else {
          {{ i + 1 }}
        }
      </span>
      <span class="stepper__label">{{ step | translate }}</span>
    </li>
  }
</ol>
