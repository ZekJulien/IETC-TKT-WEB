<section class="members">
  <header class="members__head">
    <div class="members__heading">
      <h1 class="members__title">{{ 'membersPage.title' | translate }}</h1>
      <p class="members__sub">{{ 'membersPage.subtitle' | translate }}</p>
    </div>

    @if (canInvite()) {
      <div class="members__head-actions">
        <span class="members__count">{{
          'membersPage.count' | translate: { count: members.total() }
        }}</span>
        <app-button variant="primary" (click)="openModal()">
          {{ 'membersPage.invite' | translate }}
        </app-button>
      </div>
    }
  </header>

  @if (companyId(); as companyId) {
    <app-member-list [companyId]="companyId" />
  }
</section>

<app-modal
  [open]="open()"
  [heading]="'inviteMember.title' | translate"
  [closeLabel]="'inviteMember.cancel' | translate"
  (closed)="closeModal()"
>
  @if (open() && companyId(); as companyId) {
    <app-invite-member [companyId]="companyId" (done)="closeModal()" />
  }
</app-modal>
