<app-auth-shell tagline="maintenancePage.tagline">
  <div class="maintenance">
    <span class="maintenance__icon" aria-hidden="true">
      <svg
        viewBox="0 0 24 24"
        width="40"
        height="40"
        fill="none"
        stroke="currentColor"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M14.7 6.3a4 4 0 0 0-5.6 5.6l-6.4 6.4a2 2 0 1 0 2.8 2.8l6.4-6.4a4 4 0 0 0 5.6-5.6l-2.5 2.5-2.4-.6-.6-2.4 2.7-2.3Z" />
      </svg>
    </span>

    <h1 class="maintenance__title">{{ 'maintenancePage.title' | translate }}</h1>
    <p class="maintenance__message">{{ 'maintenancePage.message' | translate }}</p>

    <app-button variant="primary" (click)="goBack()">
      {{ 'maintenancePage.back' | translate }}
    </app-button>
  </div>
</app-auth-shell>
