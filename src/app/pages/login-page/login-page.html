<app-auth-shell>
  <header class="login__head">
    <h1 class="login__title">{{ 'loginPage.title' | translate }}</h1>
    <p class="login__sub">
      {{ 'loginPage.noAccount' | translate }}
      <a [routerLink]="['/', AppRoute.Register]">{{ 'loginPage.register' | translate }}</a>
    </p>
  </header>

  @if (store.error(); as error) {
    <app-alert>{{ error }}</app-alert>
  }

  <form class="login__form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <app-form-field label="loginPage.emailLabel" [control]="form.controls.email" forId="login-email">
      <app-input
        inputId="login-email"
        type="email"
        formControlName="email"
        autocomplete="email"
        [placeholder]="'loginPage.emailPlaceholder' | translate"
      />
    </app-form-field>

    <app-form-field
      label="loginPage.passwordLabel"
      [control]="form.controls.password"
      forId="login-password"
    >
      <app-input
        inputId="login-password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        [placeholder]="'loginPage.passwordPlaceholder' | translate"
      />
    </app-form-field>

    <app-button type="submit" variant="primary" [block]="true" [loading]="store.loading()">
      {{ 'loginPage.submit' | translate }}
    </app-button>
  </form>
</app-auth-shell>
