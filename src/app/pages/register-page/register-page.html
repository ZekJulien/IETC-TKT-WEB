<app-auth-shell>
  <header class="reg__head">
    <h1 class="reg__title">{{ 'registerPage.title' | translate }}</h1>
    <p class="reg__sub">
      {{ 'registerPage.haveAccount' | translate }}
      <a [routerLink]="['/', AppRoute.Login]">{{ 'registerPage.login' | translate }}</a>
    </p>
  </header>

  @if (store.error(); as error) {
    <div class="reg__alert" role="alert">{{ error }}</div>
  }

  <form class="reg__form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <app-form-field label="registerPage.emailLabel" [control]="form.controls.email" forId="reg-email">
      <app-input
        inputId="reg-email"
        type="email"
        formControlName="email"
        autocomplete="email"
        [placeholder]="'registerPage.emailPlaceholder' | translate"
      />
    </app-form-field>

    <app-form-field
      label="registerPage.passwordLabel"
      [control]="form.controls.password"
      [hideMessage]="true"
      forId="reg-password"
    >
      <app-input
        inputId="reg-password"
        type="password"
        formControlName="password"
        autocomplete="new-password"
        [placeholder]="'registerPage.passwordPlaceholder' | translate"
      />
    </app-form-field>

    <app-password-rules [value]="form.controls.password.value" />

    <app-form-field
      label="registerPage.confirmLabel"
      [control]="form.controls.confirmPassword"
      [extraError]="confirmMismatch ? 'common.errors.passwordMismatch' : null"
      forId="reg-confirm"
    >
      <app-input
        inputId="reg-confirm"
        type="password"
        formControlName="confirmPassword"
        [forceInvalid]="confirmMismatch"
        autocomplete="new-password"
        [placeholder]="'registerPage.confirmPlaceholder' | translate"
      />
    </app-form-field>

    <app-button type="submit" variant="primary" [block]="true" [loading]="store.loading()">
      {{ 'registerPage.submit' | translate }}
    </app-button>
  </form>
</app-auth-shell>
