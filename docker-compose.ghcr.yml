services:
  db:
    image: ghcr.io/zekjulien/ietc-tkt-db:latest
    container_name: tkt_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_superuser}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:-app_user_dev}
      APP_SYSTEM_PASSWORD: ${APP_SYSTEM_PASSWORD:-app_system_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - tkt_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketing_system"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/zekjulien/ietc-tkt-api:latest
    container_name: tkt_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=ticketing_system;Username=app_user;Password=${APP_USER_PASSWORD:-app_user_dev}"
      ConnectionStrings__SystemConnection: "Host=db;Port=5432;Database=ticketing_system;Username=app_system;Password=${APP_SYSTEM_PASSWORD:-app_system_dev};MaxPoolSize=5"
    ports:
      - "${API_PORT:-5083}:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/zekjulien/ietc-tkt-web:latest
    container_name: tkt_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  tkt_pgdata:
